_min_copier_version: "9.0.0"
_subdirectory: template

_tasks:
  - >-
    {% if portfolio_file %}cp "{{ portfolio_file }}" ade-repos.txt{% endif %}
  - command:
      - bash
      - -c
      - |
        set -euo pipefail
        [ -f ade-repos.txt ] || exit 0
        CLONE_FAILURES=0
        while read -r url; do
          dir="$(basename "$url" .git)"

          # Already a valid git repo? Leave it alone.
          if git -C "$dir" rev-parse --git-dir >/dev/null 2>&1; then
            continue
          fi

          # Path exists but isn't a git repo.
          if [ -e "$dir" ]; then
            # Safe to reclone only if it's an empty directory; otherwise warn and skip.
            if [ -d "$dir" ] && [ -z "$(ls -A "$dir")" ]; then
              rmdir "$dir"
            else
              echo "    WARNING: $dir exists and is not a git repo — skipping"
              continue
            fi
          fi

          echo "==> cloning $dir"
          if ! git clone "$url" "$dir"; then
            echo "    WARNING: failed to clone $url (check access rights)"
            CLONE_FAILURES=$((CLONE_FAILURES + 1))
          fi
        done < <(grep -Ev '^\s*(#|$)' ade-repos.txt)
        if [ "$CLONE_FAILURES" -gt 0 ]; then
          echo "==> $CLONE_FAILURES repo(s) failed to clone — continuing"
        fi
  - command:
      - bash
      - -c
      - |
        set -euo pipefail
        echo "==> Installing/refreshing GSD workspace-locally..."
        npx -y get-shit-done-cc@latest --local --cursor
  - command: "git init && git add -A && git commit -m 'ADE scaffold'"
    when: "{{ _copier_operation == 'copy' }}"
  - command: "open -a Cursor '{{ ade_name }}.code-workspace'"
    when: "{{ _copier_operation == 'copy' }}"

ade_name:
  type: str
  help: Short name for this ADE (used in AGENTS.md, README.md, and PROJECT.md)
  default: my-ade

description:
  type: str
  help: One-line purpose for this ADE
  default: Parloa infra experiments

portfolio_file:
  type: str
  help: "Path to a custom repo list (one git URL per line, absolute path). Leave
    empty for default Parloa portfolio."
  default: ""

# --- Optional agentic-stack integrations ---
# These populate docs/agentic-stack.md and AGENTS.md so the agent and user
# know what's declared active for this ADE. They are NOT auto-installed into
# the user's ~/.cursor/ — apply them manually by running
#   ./agent-guardrails/install.sh --with=<derived list>
# after scaffolding. This matches the existing kitchen policy (user/system-
# level installs are never auto-run; see docs/DECISIONS.md).

include_code_graph_mcp:
  type: str
  help: "Cross-repo code-graph MCP for better multi-repo reasoning. Highest-ROI
    optional integration for Parloa portfolios. 'none' to skip."
  choices:
    - none
    - cody
    - augment
  default: none

include_code_mode_mcp:
  type: bool
  help: "Enable the Python-as-tool-calls MCP (mcp-code-executor)? Large token
    savings on tool-heavy flows; low ROI for Terraform/YAML work."
  default: false

include_letta_memory_mcp:
  type: bool
  help: "Enable the Letta/MemGPT self-editing memory MCP? Requires a running
    Letta instance (self-hosted or Letta Cloud)."
  default: false

include_eval_pipeline:
  type: str
  help: "Document a production->eval pipeline platform for this ADE. Docs-only;
    nothing is auto-installed. 'none' to omit the section entirely."
  choices:
    - none
    - latitude
    - braintrust
  default: none
