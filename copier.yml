_min_copier_version: "9.0.0"
_subdirectory: template

_tasks:
  - >-
    {% if portfolio_file %}cp "{{ portfolio_file }}" ade-repos.txt{% endif %}
  - command: "bash ade-install.sh"
    when: "{{ _copier_operation == 'copy' }}"
  - command: "git init"
    when: "{{ _copier_operation == 'copy' }}"
  - "git add -A"
  - "git commit --no-gpg-sign --allow-empty -m 'ADE scaffold from template {{ _copier_conf.version }}'"
  - command: "/Applications/Cursor.app/Contents/MacOS/Cursor \"$(pwd)\" &>/dev/null &"
    when: "{{ _copier_operation == 'copy' }}"

ade_name:
  type: str
  help: Short name for this ADE (used in AGENTS.md, README.md, and PROJECT.md)
  default: my-ade

description:
  type: str
  help: One-line purpose for this ADE
  default: Parloa infra experiments

portfolio_file:
  type: str
  help: "Path to a custom repo list (one git URL per line, absolute path). Leave empty for default Parloa portfolio."
  default: ""
