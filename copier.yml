_min_copier_version: "9.0.0"
_subdirectory: template

_tasks:
  - >-
    {% if portfolio_file %}cp {{ portfolio_file }} ade-repos.txt{% endif %}
  - "bash ade-install.sh"
  - "/Applications/Cursor.app/Contents/MacOS/Cursor . &>/dev/null &"

ade_name:
  type: str
  help: Short name for this ADE (used in AGENTS.md, README.md, and PROJECT.md)
  default: my-ade

description:
  type: str
  help: One-line purpose for this ADE
  default: Parloa infra experiments

portfolio_file:
  type: str
  help: Path to a custom repo list (one git URL per line). Leave empty to use the default Parloa portfolio.
  default: ""
