_min_copier_version: "9.0.0"
_subdirectory: template

# Copier defaults include `copier.yml`, `~*`, `*.py[co]`, `__pycache__`,
# `.git`, `.DS_Store`, and `.svn`. We re-list them because setting
# `_exclude` overrides the defaults. `_*.jinja` is a belt-and-suspenders
# pattern for any macro file that accidentally lands under `template/`;
# the canonical macro file (`_portfolio.jinja`) lives at the template
# root, outside `_subdirectory`, so it's never copied in the first place.
_exclude:
  - "_*.jinja"
  - copier.yaml
  - copier.yml
  - "~*"
  - "*.py[co]"
  - __pycache__
  - .git
  - .DS_Store
  - .svn

# PROJECT.md ownership:
#   `template/.planning/{% if not include_gsd_docs %}PROJECT.md{% endif %}.jinja`
# is a conditional-filename file (copier idiom, see D-026). When
# include_gsd_docs=true it renders to an empty filename and copier generates
# nothing at all for .planning/PROJECT.md — no `conflict`/`skip`/`overwrite`
# lines in recopy output. gsd-docs/bin/new-project.sh is then the sole
# author of PROJECT.md in shared storage. When include_gsd_docs=false the
# template renders PROJECT.md normally. This is why there is no
# `_skip_if_exists` entry for PROJECT.md — it would only be needed if the
# file were still rendered.

_tasks:
  # Task 1: clone every URL in ade-repos.txt (missing only; existing repos are
  # never touched — safe for WIP). ade-repos.txt is rendered from copier
  # answers each run, so this loop propagates answer-driven portfolio changes.
  # Pwd-gated against copier's internal temp render dirs (see D-022).
  - command:
      - bash
      - -c
      - |
        set -euo pipefail
        case "$PWD" in
          */copier._main.*)
            echo "==> [skip] copier temp render dir (task will run in destination): $PWD" >&2
            exit 0
            ;;
        esac
        [ -f ade-repos.txt ] || exit 0
        CLONE_FAILURES=0
        while read -r url; do
          dir="$(basename "$url" .git)"

          # Already a valid git repo? Leave it alone.
          if git -C "$dir" rev-parse --git-dir >/dev/null 2>&1; then
            continue
          fi

          # Path exists but isn't a git repo.
          if [ -e "$dir" ]; then
            # Safe to reclone only if it's an empty directory; otherwise warn and skip.
            if [ -d "$dir" ] && [ -z "$(ls -A "$dir")" ]; then
              rmdir "$dir"
            else
              echo "    WARNING: $dir exists and is not a git repo — skipping"
              continue
            fi
          fi

          echo "==> cloning $dir"
          clone_args=""
          if [ "$dir" = "gsd-docs" ]; then
            clone_args="-b docs"
          fi
          if ! git clone $clone_args "$url" "$dir"; then
            echo "    WARNING: failed to clone $url (check access rights)"
            CLONE_FAILURES=$((CLONE_FAILURES + 1))
          fi
        done < <(grep -Ev '^\s*(#|$)' ade-repos.txt)
        if [ "$CLONE_FAILURES" -gt 0 ]; then
          echo "==> $CLONE_FAILURES repo(s) failed to clone — continuing"
        fi
  # Task 2: GSD install — tracks @latest. Pwd-gated.
  - command:
      - bash
      - -c
      - |
        set -euo pipefail
        case "$PWD" in
          */copier._main.*)
            echo "==> [skip] copier temp render dir (task will run in destination): $PWD" >&2
            exit 0
            ;;
        esac
        echo "==> Installing/refreshing GSD workspace-locally..."
        npx -y get-shit-done-cc@latest --local --cursor
  # Task 3: gsd-docs onboard — wires .planning/ symlink into gsd-docs, installs
  # agent adapters + pre-push hook. See D-021. Gated on include_gsd_docs AND
  # the presence of gsd-docs/bin (so it's a no-op if the clone failed).
  - command:
      - bash
      - -c
      - |
        set -euo pipefail
        case "$PWD" in
          */copier._main.*)
            echo "==> [skip] copier temp render dir (task will run in destination): $PWD" >&2
            exit 0
            ;;
        esac
        if [ ! -d gsd-docs/bin ]; then
          echo "==> [skip] gsd-docs not cloned — skipping onboard"
          exit 0
        fi
        echo "==> Onboarding workspace into gsd-docs..."
        # new-project.sh sets up shared storage, authors PROJECT.md from
        # --description if missing, and replaces local .planning/ with a
        # symlink. Runs when .planning is still a regular dir (initial
        # scaffold) or absent entirely (gsd-docs-only workspace). When
        # .planning is already a symlink (post-onboarding recopy), skip —
        # the setup is already done.
        if [ ! -L .planning ]; then
          gsd-docs/bin/new-project.sh \
            --shared "{{ ade_name }}" \
            --workspace "$PWD" \
            --description "{{ description }}"
        fi
        gsd-docs/bin/onboard.sh --workspace "$PWD"
    when: "{{ include_gsd_docs }}"
  # Task 4: finalize. One task handles both the initial scaffold and every
  # subsequent recopy/update, keyed off whether `.git/` already exists at
  # the destination when the task starts:
  #
  #   - no `.git/` → this is the first `copier copy`. git init, commit
  #     everything as 'ADE scaffold', and open the workspace in Cursor.
  #   - `.git/` exists → this is a recopy or update. Detect conflict markers
  #     (defensive — `--overwrite` should prevent them). If the working tree
  #     is clean, exit quietly. Otherwise stage everything and commit as
  #     'chore: copier recopy to <vcs_ref_hash>', leaving a revertable
  #     single-commit record of the template bump.
  #
  # Why key off `.git/` and not `_copier_operation`: copier sets
  # `_copier_operation` to `'copy'` for BOTH `copier copy` and `copier
  # recopy` (recopy is implemented as `run_copy` under the hood, see
  # docs/DECISIONS.md D-022), so that variable can't distinguish "first
  # scaffold" from "user is re-applying the template". The on-disk `.git/`
  # state is the authoritative signal.
  #
  # Pwd-gated against copier's internal temp render dirs. Cursor is only
  # launched on the initial scaffold — otherwise every recopy would re-open
  # the workspace.
  - command:
      - bash
      - -c
      - |
        set -euo pipefail
        case "$PWD" in
          */copier._main.*)
            echo "==> [skip] copier temp render dir (task runs in destination): $PWD" >&2
            exit 0
            ;;
        esac

        if [ ! -d .git ]; then
          echo "==> [scaffold] initializing git and creating ADE scaffold commit"
          git init
          git add -A
          git commit -m 'ADE scaffold'

          # Open the workspace in Cursor. Prefer the `cursor` CLI with
          # --new-window: it reliably opens a fresh window via Cursor's IPC.
          # `open -na Cursor <file>` does NOT — Cursor's single-instance lock
          # routes the file open back to the primary process and the new
          # bundle instance exits. Fall back to `open -a` (reuses window)
          # only if no cursor binary is available.
          ws='{{ ade_name }}.code-workspace'
          if command -v cursor >/dev/null 2>&1; then
            cursor --new-window "$ws" || true
          elif [ -x /Applications/Cursor.app/Contents/Resources/app/bin/cursor ]; then
            /Applications/Cursor.app/Contents/Resources/app/bin/cursor --new-window "$ws" || true
          else
            open -a Cursor "$ws" || true
          fi
          exit 0
        fi

        conflicted=""
        while IFS= read -r f; do
          [ -f "$f" ] || continue
          if grep -qE '^(<{7}|={7}|>{7})( |$)' "$f" 2>/dev/null; then
            conflicted="${conflicted}${f}"$'\n'
          fi
        done < <(git diff --name-only; git diff --cached --name-only)
        if [ -n "$conflicted" ]; then
          echo "==> [auto-commit] merge conflict markers detected — NOT auto-committing:" >&2
          printf '    %s\n' $conflicted >&2
          echo "    Resolve conflicts manually, then: git add -A && git commit" >&2
          exit 0
        fi

        if git diff --quiet && git diff --cached --quiet; then
          echo "==> [auto-commit] nothing to commit"
          exit 0
        fi

        echo "==> [auto-commit] copier recopy to {{ _copier_conf.vcs_ref_hash }}"
        git add -A
        git commit -m "chore: copier recopy to {{ _copier_conf.vcs_ref_hash }}"

ade_name:
  type: str
  help: Short name for this ADE (used in AGENTS.md, README.md, and PROJECT.md)
  default: my-ade

description:
  type: str
  help: One-line purpose for this ADE
  default: Parloa infra experiments

include_gsd_docs:
  type: bool
  help: "Wire .planning/ into the shared gsd-docs repo (parloa/gsd-docs). The repo
    is always cloned; this toggle controls whether onboard.sh runs to create the
    symlink, agent adapters, and pre-push hook. Disable to keep .planning/
    local."
  default: true

include_agent_guardrails:
  type: bool
  help: "Clone madi-parloa/agent-guardrails (policy-gate MCP, hooks, custom
    skills/rules)? Clone-only; run its install.sh manually to activate."
  default: true

include_cursor_self_hosted_agent:
  type: bool
  help: "Clone madi-parloa/cursor-self-hosted-agent?"
  default: true

gsd_docs_handle:
  type: str
  help: "Your gsd-docs handle — the GitHub username that owns `users/<handle>/**`
    in the shared gsd-docs repo. Used to render the template-owned sentinel
    region in CLAUDE.md and AGENTS.md. Must match the value
    `gsd-docs/bin/onboard.sh` detects (via `gh api user` or
    `gsd-docs/.gsd-docs-user`); mismatch causes a one-time conflict on next
    recopy. See docs/DECISIONS.md D-025."
  default: ""
  when: "{{ include_gsd_docs }}"

portfolio_groups:
  type: str
  multiselect: true
  help: "Which Parloa repo groups to include? Each group expands to a fixed set of
    repos — see docs/DECISIONS.md D-023."
  choices:
    - core-infra
    - stamps
    - catalog
    - kitchens
    - template-source
  default:
    - core-infra
    - stamps
    - catalog
    - kitchens
    - template-source

extra_repos:
  type: str
  multiline: true
  default: ""
  help: |
    Extra repos to clone, one per line. Short form 'some-repo' assumes parloa/some-repo.
    Use 'org/some-repo' for a different org (e.g. 'madi-parloa/my-tool'). Full git URLs
    (git@...:..., https://..., ending in .git) are also accepted. Blank lines and '#'
    comments are ignored. See docs/DECISIONS.md D-024.

default_org:
  type: str
  default: "parloa"
  when: false
  help: "Default GitHub org used when expanding bare repo names. Override via
    `copier ... --data default_org=other-org` if scaffolding outside Parloa."

portfolio_file:
  type: str
  default: ""
  when: false
  help: "Inert answer key, kept so older .copier-answers.yml files still load.
    Portfolio is driven by portfolio_groups + extra_repos; see D-023."

# --- Optional agentic-stack integrations ---
# These populate docs/agentic-stack.md and AGENTS.md so the agent and user
# know what's declared active for this ADE. They are NOT auto-installed into
# the ADE's .cursor/ — apply them manually by running
#   ./agent-guardrails/install.sh --with=<derived list>
# from the scaffolded ADE root after scaffolding. install.sh defaults to
# workspace scope (writes into <ade>/.cursor/ via $PWD), which matches the
# workspace-local isolation goal in docs/DECISIONS.md (D-001). The kitchen
# policy of never auto-running installs still applies.

include_code_graph_mcp:
  type: str
  help: "Cross-repo code-graph MCP for better multi-repo reasoning. Highest-ROI
    optional integration for Parloa portfolios. 'none' to skip."
  choices:
    - none
    - cody
    - augment
  default: none

include_code_mode_mcp:
  type: bool
  help: "Enable the Python-as-tool-calls MCP (mcp-code-executor)? Large token
    savings on tool-heavy flows; low ROI for Terraform/YAML work."
  default: false

include_letta_memory_mcp:
  type: bool
  help: "Enable the Letta/MemGPT self-editing memory MCP? Requires a running Letta
    instance (self-hosted or Letta Cloud)."
  default: false

include_eval_pipeline:
  type: str
  help: "Document a production->eval pipeline platform for this ADE. Docs-only;
    nothing is auto-installed. 'none' to omit the section entirely."
  choices:
    - none
    - latitude
    - braintrust
  default: none
